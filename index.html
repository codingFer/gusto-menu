<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="GustoMenu — Crea menús digitales compartibles con pedidos por WhatsApp. Sin backend, gratis." />
  <title>GustoMenu — Menú Digital con WhatsApp</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- Top Navigation Bar -->
  <nav class="navbar" id="navbar">
    <a href="#/" class="navbar-brand" id="nav-brand">
      <span class="brand-icon">🍽️</span>
      <span class="brand-name">GustoMenu</span>
    </a>
    <div class="navbar-actions" id="navbar-actions"></div>
    <button id="theme-toggle" class="btn btn--icon" aria-label="Cambiar tema" style="font-size: 20px;">☀️</button>
  </nav>

  <!-- App Router Container -->
  <main id="app-root"></main>

  <!-- Sticky Bottom Bar (cart / CTA) -->
  <div class="sticky-bar hidden" id="sticky-bar"></div>

  <!-- Toast Notification -->
  <div class="toast hidden" id="toast"></div>

  <script src="js/app.js"></script>
</body>
</html>
