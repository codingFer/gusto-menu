<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="31" fill="#c91e2b"/>

  <!-- Tablet / menu board body -->
  <rect x="13" y="8" width="26" height="34" rx="3" ry="3" fill="white" opacity="0.95"/>
  <!-- Tablet camera dot -->
  <circle cx="26" cy="10.5" r="1" fill="#c91e2b" opacity="0.4"/>
  <!-- Menu lines inside tablet -->
  <rect x="17" y="16" width="7" height="1.5" rx="0.8" fill="#c91e2b" opacity="0.5"/>
  <rect x="26" y="16" width="10" height="1.5" rx="0.8" fill="#e0e0e0"/>
  <rect x="17" y="20" width="7" height="1.5" rx="0.8" fill="#c91e2b" opacity="0.5"/>
  <rect x="26" y="20" width="10" height="1.5" rx="0.8" fill="#e0e0e0"/>
  <rect x="17" y="24" width="7" height="1.5" rx="0.8" fill="#c91e2b" opacity="0.5"/>
  <rect x="26" y="24" width="10" height="1.5" rx="0.8" fill="#e0e0e0"/>
  <rect x="17" y="28" width="7" height="1.5" rx="0.8" fill="#c91e2b" opacity="0.5"/>
  <rect x="26" y="28" width="10" height="1.5" rx="0.8" fill="#e0e0e0"/>

  <!-- Fork (left tine group) -->
  <g transform="translate(28, 8)">
    <!-- Fork handle -->
    <rect x="5" y="18" width="2.5" height="14" rx="1.2" fill="white"/>
    <!-- Fork neck -->
    <rect x="5.2" y="13" width="2" height="6" rx="0.8" fill="white"/>
    <!-- Fork tines -->
    <rect x="3.5" y="8" width="1.2" height="7" rx="0.6" fill="white"/>
    <rect x="5.7" y="8" width="1.2" height="7" rx="0.6" fill="white"/>
    <rect x="7.8" y="8" width="1.2" height="7" rx="0.6" fill="white"/>
  </g>

  <!-- Checkmark (bold, bottom-right) -->
  <polyline
    points="30,46 36,54 52,36"
    fill="none"
    stroke="white"
    stroke-width="5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>